services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/compliance.db:/app/compliance.db

  frontend:
    image: python:3.12-slim
    working_dir: /app
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             streamlit run app.py --server.address 0.0.0.0 --server.port 8501"
    depends_on:
      - backend
