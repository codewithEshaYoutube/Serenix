services:
  deepstream:
    build: .
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ./videos:/videos:ro
      - ./configs:/configs:ro
      # TensorRT engine is built on first run (~1-3 min); cached here so
      # restarts are fast.
      - engines:/engines
    depends_on: [mosquitto]

  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  engines:
